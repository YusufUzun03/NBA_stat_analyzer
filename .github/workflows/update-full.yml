name: Weekly data refresh (full)

# Same as the nightly core refresh, plus the slow per-player scrapes — career
# tables and game logs (Recent Form + consistency). These hit one page per
# player (hundreds of throttled requests, several minutes), so they run weekly
# rather than nightly to stay polite to basketball-reference.

on:
  schedule:
    - cron: "0 10 * * 1"   # 10:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Regenerate all snapshots
        working-directory: backend
        env:
          NBA_CACHE_TTL: "0"
        run: |
          python scripts/gen_players.py
          python scripts/gen_schedule.py
          python scripts/gen_advanced.py
          python scripts/gen_career.py
          python scripts/gen_gamelog.py
          python scripts/gen_history.py
          python scripts/gen_standings.py
          python scripts/gen_playoffs.py
          python scripts/gen_allstar.py
          python scripts/gen_manifest.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frontend/data
          if git diff --staged --quiet; then
            echo "No data changes this week."
          else
            git commit -m "data: weekly full refresh [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
