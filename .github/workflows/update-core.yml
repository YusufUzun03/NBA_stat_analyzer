name: Nightly data refresh (core)

# Regenerates the fast snapshots that drive the value board, positional ranks,
# streamers, projections and leaders — players + schedule + advanced — then
# commits any changes and redeploys the site. Game-by-game season averages
# update here, so new games, trades and called-up players show within a day.

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily — after US games are final
  workflow_dispatch:

permissions:
  contents: write   # commit the regenerated snapshots
  pages: write      # deploy the refreshed site
  id-token: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Regenerate core snapshots
        working-directory: backend
        env:
          NBA_CACHE_TTL: "0"   # always fetch fresh in CI
        run: |
          python scripts/gen_players.py
          python scripts/gen_schedule.py
          python scripts/gen_advanced.py
          python scripts/gen_manifest.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data/*.json
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: nightly core refresh [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
