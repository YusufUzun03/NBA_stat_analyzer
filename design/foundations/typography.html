<!-- @dsCard group="Foundations" name="Typography" subtitle="Archivo display + Inter UI" width=620 height=380 -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  body { margin:0; font-family:"Inter",system-ui,sans-serif;
    background:radial-gradient(900px 500px at 80% -10%,#161c30,#0a0c14 55%); color:#f4f6fb; padding:30px; }
  .row { padding:12px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .lbl { color:#9aa3b8; font-size:.72rem; letter-spacing:1px; text-transform:uppercase; }
  .d1 { font-family:"Archivo"; font-weight:900; font-size:3rem; letter-spacing:-1px; line-height:1; }
  .d2 { font-family:"Archivo"; font-weight:800; font-size:1.9rem; }
  .grad { background:linear-gradient(120deg,#ee6730,#ffc24b); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .body { font-size:1.05rem; color:#c9cedb; max-width:38ch; }
  .small { font-size:.85rem; color:#9aa3b8; }
</style></head>
<body>
  <div class="row"><div class="lbl">Display / Archivo 900</div><div class="d1">Win your <span class="grad">league</span></div></div>
  <div class="row"><div class="lbl">Heading / Archivo 800</div><div class="d2">Everything a manager needs</div></div>
  <div class="row"><div class="lbl">Body / Inter 400</div><div class="body">Live z-score rankings, instant punt re-ranking, trade grades and projections.</div></div>
  <div class="row"><div class="lbl">Caption / Inter 500</div><div class="small">582 players · 9 categories · 1279 games tracked</div></div>
</body></html>
