<!-- @dsCard group="Hero" name="3D basketball hero" subtitle="Three.js · spinning, lit, parallax" width=960 height=560 -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",system-ui,sans-serif; color:#f4f6fb; overflow:hidden;
    background:radial-gradient(1100px 650px at 80% -10%,#161c30,#0a0c14 55%); }
  .orbs { position:fixed; inset:0; filter:blur(60px); z-index:0; }
  .orb { position:absolute; border-radius:50%; opacity:.5; }
  .o1 { width:420px; height:420px; top:-120px; right:-60px; background:radial-gradient(circle,#ee6730,transparent 70%); }
  .o2 { width:340px; height:340px; bottom:-100px; left:-100px; background:radial-gradient(circle,#3a6df0,transparent 70%); }
  .hero { position:relative; z-index:1; min-height:100vh; display:grid; grid-template-columns:1.05fr .95fr;
    align-items:center; gap:24px; max-width:1100px; margin:0 auto; padding:40px clamp(20px,5vw,48px); }
  .eyebrow { display:inline-block; font-weight:700; letter-spacing:2px; font-size:.7rem; color:#ffc24b;
    padding:6px 12px; border:1px solid rgba(255,194,75,.3); border-radius:999px; background:rgba(255,194,75,.08); margin-bottom:20px; }
  h1 { font-family:"Archivo"; font-weight:900; font-size:clamp(2.4rem,5vw,4.2rem); line-height:1.02; letter-spacing:-1px; }
  .grad { background:linear-gradient(120deg,#ee6730,#ffc24b); -webkit-background-clip:text; background-clip:text; color:transparent; }
  p.sub { color:#9aa3b8; font-size:1.1rem; max-width:30rem; margin:20px 0 28px; }
  .cta { display:flex; gap:14px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; padding:12px 22px; border-radius:999px; font-weight:700; cursor:pointer; border:1px solid transparent; }
  .primary { background:linear-gradient(135deg,#ee6730,#ff8a4c); color:#1a0e07; box-shadow:0 10px 30px rgba(238,103,48,.4); }
  .outline { border-color:rgba(255,255,255,.08); color:#f4f6fb; background:rgba(255,255,255,.04); }
  .ball { position:relative; display:grid; place-items:center; height:100%; }
  #c { width:min(420px,72vw); height:min(420px,72vw); }
  @media (max-width:840px){ .hero{ grid-template-columns:1fr; text-align:center; } .ball{ order:-1; } .cta{ justify-content:center; } }
</style></head>
<body>
  <div class="orbs"><span class="orb o1"></span><span class="orb o2"></span></div>
  <section class="hero">
    <div>
      <span class="eyebrow">9-CATEGORY · Z-SCORE ENGINE</span>
      <h1>Win your league<br/>with <span class="grad">real analytics.</span></h1>
      <p class="sub">Live z-score rankings, instant punt re-ranking, trade grades and rest-of-season projections — powered by full-season NBA data.</p>
      <div class="cta"><button class="btn primary">See live rankings</button><button class="btn outline">Explore tools</button></div>
    </div>
    <div class="ball"><div id="c"></div></div>
  </section>

  <script type="module">
    import * as THREE from "three";
    const mount = document.getElementById("c");
    const size = () => Math.min(mount.clientWidth, mount.clientHeight) || 380;
    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(size(), size());
    mount.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38,1,0.1,100); camera.position.set(0,0,6.4);
    scene.add(new THREE.AmbientLight(0xffffff,0.45));
    const key = new THREE.DirectionalLight(0xfff0e0,2.1); key.position.set(4,5,6); scene.add(key);
    const rim = new THREE.DirectionalLight(0x5b7cff,1.3); rim.position.set(-6,-2,-4); scene.add(rim);
    const warm = new THREE.PointLight(0xee6730,1.4,30); warm.position.set(-3,3,4); scene.add(warm);

    function ballTexture(){
      const W=1024,H=512,c=document.createElement("canvas"); c.width=W; c.height=H;
      const x=c.getContext("2d");
      const g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,"#e8742f"); g.addColorStop(.5,"#d2581c"); g.addColorStop(1,"#b8470f");
      x.fillStyle=g; x.fillRect(0,0,W,H);
      x.strokeStyle="#140a06"; x.lineCap="round"; x.lineWidth=H*0.016;
      const ln=(p)=>{ x.beginPath(); x.moveTo(p[0][0],p[0][1]); for(let i=1;i<p.length;i++)x.lineTo(p[i][0],p[i][1]); x.stroke(); };
      ln([[W*.5,0],[W*.5,H]]); ln([[0,0],[0,H]]); ln([[W,0],[W,H]]);
      const amp=H*.46, mid=H*.5, steps=160;
      for(const ph of [0,Math.PI]){ const pts=[]; for(let i=0;i<=steps;i++){ const px=i/steps*W; pts.push([px, mid+amp*Math.sin(px/W*Math.PI*2+ph)]); } ln(pts); }
      const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=8; return t;
    }
    const ball=new THREE.Mesh(new THREE.SphereGeometry(2,96,96),
      new THREE.MeshStandardMaterial({ map:ballTexture(), roughness:.78, metalness:.05 }));
    ball.rotation.z=0.18; scene.add(ball);
    const target={x:0,y:0};
    addEventListener("pointermove",e=>{ target.x=(e.clientX/innerWidth-.5)*.6; target.y=(e.clientY/innerHeight-.5)*.6; });
    let t=0;
    (function loop(){ requestAnimationFrame(loop); t+=0.016; ball.rotation.y+=0.006; ball.position.y=Math.sin(t*1.1)*0.12;
      camera.position.x+=(target.x-camera.position.x)*.05; camera.position.y+=(-target.y-camera.position.y)*.05; camera.lookAt(0,0,0);
      renderer.render(scene,camera); })();
    addEventListener("resize",()=>{ const s=size(); renderer.setSize(s,s); camera.aspect=1; camera.updateProjectionMatrix(); });
  </script>
</body></html>
