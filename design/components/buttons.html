<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / outline / ghost" width=560 height=220 -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet" />
<style>
  body { margin:0; font-family:"Inter",system-ui,sans-serif;
    background:radial-gradient(900px 500px at 80% -10%,#161c30,#0a0c14 55%); color:#f4f6fb;
    display:flex; gap:16px; align-items:center; justify-content:center; min-height:100vh; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 22px; border-radius:999px;
    font-weight:700; font-size:.95rem; cursor:pointer; border:1px solid transparent; transition:transform .15s; }
  .btn:hover { transform:translateY(-2px); }
  .primary { background:linear-gradient(135deg,#ee6730,#ff8a4c); color:#1a0e07; box-shadow:0 10px 30px rgba(238,103,48,.4); }
  .outline { border-color:rgba(255,255,255,.08); color:#f4f6fb; background:rgba(255,255,255,.04); }
  .ghost { padding:8px 16px; border:1px solid rgba(255,255,255,.08); color:#f4f6fb; }
</style></head>
<body>
  <button class="btn primary">See live rankings</button>
  <button class="btn outline">Explore tools</button>
  <button class="btn ghost">API</button>
</body></html>
