<!-- @dsCard group="Components" name="Rankings board" subtitle="Live top-value players" width=640 height=420 -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  body { margin:0; font-family:"Inter",system-ui,sans-serif;
    background:radial-gradient(900px 500px at 80% -10%,#161c30,#0a0c14 55%); color:#f4f6fb; padding:24px; }
  .board { max-width:560px; margin:0 auto; background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08); border-radius:18px; overflow:hidden; }
  .head,.row { display:grid; grid-template-columns:42px 1.6fr 64px 80px 56px 56px 56px; gap:8px; padding:13px 18px; align-items:center; }
  .head { color:#9aa3b8; font-size:.72rem; letter-spacing:1px; text-transform:uppercase; font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.02); }
  .row { border-bottom:1px solid rgba(255,255,255,.04); font-size:.92rem; }
  .rk { font-family:"Archivo"; color:#9aa3b8; }
  .pl { font-weight:600; }
  .tm { color:#9aa3b8; font-size:.85rem; }
  .tot { font-family:"Archivo"; font-weight:700; color:#ffc24b; }
  .row.top1 .tot { color:#ff8a4c; }
</style></head>
<body>
  <div class="board">
    <div class="head"><span>#</span><span>Player</span><span>Team</span><span>Total</span><span>PTS</span><span>REB</span><span>AST</span></div>
    <div class="row top1"><span class="rk">1</span><span class="pl">Nikola Jokić</span><span class="tm">DEN</span><span class="tot">10.0</span><span>27.0</span><span>12.8</span><span>10.1</span></div>
    <div class="row"><span class="rk">2</span><span class="pl">Victor Wembanyama</span><span class="tm">SAS</span><span class="tot">9.0</span><span>24.3</span><span>11.0</span><span>3.9</span></div>
    <div class="row"><span class="rk">3</span><span class="pl">Shai Gilgeous-Alexander</span><span class="tm">OKC</span><span class="tot">8.1</span><span>31.1</span><span>5.5</span><span>6.4</span></div>
    <div class="row"><span class="rk">4</span><span class="pl">Kawhi Leonard</span><span class="tm">LAC</span><span class="tot">6.9</span><span>24.8</span><span>6.0</span><span>3.5</span></div>
    <div class="row"><span class="rk">5</span><span class="pl">Tyrese Maxey</span><span class="tm">PHI</span><span class="tot">6.8</span><span>27.4</span><span>4.0</span><span>6.1</span></div>
    <div class="row"><span class="rk">6</span><span class="pl">Luka Dončić</span><span class="tm">LAL</span><span class="tot">5.6</span><span>33.5</span><span>7.7</span><span>8.3</span></div>
  </div>
</body></html>
